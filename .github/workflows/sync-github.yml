name: Sync GitHub Source

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync-github-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Sync manifest from GitHub source
        run: bash scripts/sync-from-github.sh

      - name: Detect version
        id: version
        run: |
          version=$(jq -r '.package.version' nix/package-manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if version tag exists
        id: tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit manifest update
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package-manifest.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.tag.outputs.exists }}" = "true" ]; then
            commit_message="chore: restore sync ${{ steps.version.outputs.version }} from GitHub"
          else
            commit_message="chore: sync ${{ steps.version.outputs.version }} from GitHub"
          fi
          git commit -m "$commit_message"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.tag.outputs.exists == 'false' && steps.commit.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false' && steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: false
          body: |
            Automated sync from GitHub for `${{ github.event.repository.name }}`.

            Upstream version: `${{ steps.version.outputs.version }}`
